spring.application.name=order-service-producer

server.port=8081

#DATABASE
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/karapada-school
spring.datasource.username=postgres
spring.datasource.password=sisu

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ===== Kafka Config =====
spring.kafka.bootstrap-servers=localhost:9092

#==========Producer==============
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false


# Optional: Consumer config if you later consume in same service
#spring.kafka.consumer.group-id=order-service-group
#spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
#spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ===== Logging =====
logging.level.org.springframework=INFO
logging.level.com.example.orderservice=DEBUG