spring.application.name=notification-service-consumer

server.port=8083

#DATABASE
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/karapada-school
spring.datasource.username=postgres
spring.datasource.password=sisu

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ===== Kafka =====
spring.kafka.bootstrap-servers=localhost:9092

# Consumer config (consumes PaymentEvent)
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.kafka.notification.model.PaymentEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*


# Logging
logging.level.org.springframework=INFO
logging.level.com.example.inventoryservice=DEBUG